# Docker 镜像构建工作流
name: Docker Build

on:
  workflow_call:
    inputs:
      version:
        description: '要构建的版本号'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - variant: lite
            dockerfile: docker/Dockerfile
            suffix: ""
            description: "Lightweight (Go Supervisord, No Python)"
          - variant: official
            dockerfile: docker/Dockerfile.official
            suffix: "-official"
            description: "Official Compatible (Python Supervisord)"
          - variant: paas-frp
            dockerfile: docker/Dockerfile.paas-frp
            suffix: "-paas-frp"
            description: "PaaS FRP TCP Tunnel"
          - variant: go-paas-frp
            dockerfile: docker/Dockerfile.go-paas-frp
            suffix: "-go-paas-frp"
            description: "Go Implementation PaaS FRP TCP Tunnel"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve rw-node-go version
        id: go_version
        if: matrix.variant == 'go-paas-frp'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(gh api repos/x-dora/rw-node-go/releases/latest --jq '.tag_name')"
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::Unable to resolve x-dora/rw-node-go latest release"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      
      - name: Extract metadata
        id: meta
        if: matrix.variant != 'go-paas-frp'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Extract Go metadata
        id: go_meta
        if: matrix.variant == 'go-paas-frp'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.go_version.outputs.version }}${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
      
      - name: Build and push
        if: matrix.variant != 'go-paas-frp'
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Go PaaS FRP
        if: matrix.variant == 'go-paas-frp'
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.go_meta.outputs.tags }}
          labels: ${{ steps.go_meta.outputs.labels }}
          build-args: |
            RW_NODE_GO_VERSION=${{ steps.go_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:${{ inputs.version }}\` | Lightweight (Go Supervisord) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest\` | Lightweight (Go Supervisord) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:${{ inputs.version }}-official\` | Official Compatible (Python Supervisord) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest-official\` | Official Compatible (Python Supervisord) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:${{ inputs.version }}-paas-frp\` | PaaS FRP TCP Tunnel |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest-paas-frp\` | PaaS FRP TCP Tunnel |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:<rw-node-go-version>-go-paas-frp\` | Go Implementation PaaS FRP TCP Tunnel |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest-go-paas-frp\` | Go Implementation PaaS FRP TCP Tunnel |" >> $GITHUB_STEP_SUMMARY
