# 统一的 Release 入口：
# - 自动路径：Renovate 升级 `.upstream-version` 后 push 到 main 自动触发
# - Docker 路径：Docker 镜像文件变更后 push 到 main 自动重建镜像
# - 手动路径：workflow_dispatch 手动强制构建指定版本
name: Release

on:
  push:
    branches: [main]
    paths:
      - '.upstream-version'
      - 'docker/**'
      - '.github/workflows/release.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 .upstream-version）'
        required: false
        type: string
      build_release:
        description: '构建 Release 包'
        required: false
        type: boolean
        default: true
      build_docker:
        description: '构建 Docker 镜像'
        required: false
        type: boolean
        default: true
      go_paas_only:
        description: '仅更新 Go PaaS 镜像（latest）'
        required: false
        type: boolean
        default: false

env:
  UPSTREAM_REPO: remnawave/node

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build_release: ${{ steps.v.outputs.build_release }}
      build_docker: ${{ steps.v.outputs.build_docker }}
      go_paas_only: ${{ steps.v.outputs.go_paas_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and flags
        id: v
        run: |
          GO_PAAS_ONLY="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            GO_PAAS_ONLY="${{ github.event.inputs.go_paas_only }}"
            if [[ "$GO_PAAS_ONLY" == "true" ]]; then
              echo "build_release=false" >> "$GITHUB_OUTPUT"
              echo "build_docker=true"   >> "$GITHUB_OUTPUT"
            else
              echo "build_release=${{ github.event.inputs.build_release }}" >> "$GITHUB_OUTPUT"
              echo "build_docker=${{ github.event.inputs.build_docker }}"   >> "$GITHUB_OUTPUT"
            fi
          else
            VERSION=""
            if [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
              CHANGED_FILES="$(git ls-tree -r --name-only HEAD)"
            else
              CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
            fi

            echo "Changed files:"
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -qx '.upstream-version'; then
              echo "build_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "build_release=false" >> "$GITHUB_OUTPUT"
            fi

            echo "build_docker=true" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$VERSION" ]]; then
            if [[ ! -f .upstream-version ]]; then
              echo "::error::.upstream-version 文件不存在且未提供 version 输入"
              exit 1
            fi
            VERSION=$(tr -d '[:space:]' < .upstream-version)
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::无法解析版本号"
            exit 1
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "go_paas_only=$GO_PAAS_ONLY" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build and Release
    needs: resolve
    if: ${{ needs.resolve.outputs.build_release == 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
    permissions:
      contents: write

  build-docker:
    name: Build Docker Image
    needs: [resolve, build-release]
    if: |
      !cancelled() &&
      needs.resolve.outputs.build_docker == 'true' &&
      (needs.build-release.result == 'success' || needs.build-release.result == 'skipped')
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      go_paas_only: ${{ needs.resolve.outputs.go_paas_only == 'true' }}
    permissions:
      contents: read
      packages: write
